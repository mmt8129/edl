<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>📱 RESİMLİ NOTLAR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #faf9f6;
            min-height: 100vh;
            padding: 0;
            padding-bottom: 20px;
        }

        /* TÜM YAZILAR KALIN (AMA OTOMATİK BÜYÜK HARF YOK) */
        h1, h2, h3, p, span, button, input, textarea, .baslik, .menu-item {
            font-weight: 700 !important;
            /* text-transform: uppercase kaldırıldı */
            letter-spacing: 0.3px;
        }

        /* BUTONLAR - KÜÇÜLTÜLDÜ %30 */
        button {
            border: none;
            border-radius: 30px;
            padding: 10px 16px;        /* eskiden 14 22 */
            font-size: 14px;            /* eskiden 18px */
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            transition: all 0.1s ease;
            border: 2px solid transparent;
        }
        button:active {
            transform: scale(0.97);
        }

        .btn-mavi {
            background-color: #2b7be4;
            color: white;
        }
        .btn-kirmizi {
            background-color: #dc3545;
            color: white;
        }

        /* SABİT BANNER */
        .sabit-banner {
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #faf9f6;
            padding: 12px 16px 8px 16px;   /* biraz inceldi */
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #2b7be4;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .banner-geri, .banner-sil {
            background: none;
            box-shadow: none;
            padding: 8px 14px !important;   /* küçüldü */
            font-size: 22px !important;      /* 28 → 22 */
            border: 2px solid;
            background-color: white;
        }
        .banner-geri {
            color: #2b7be4;
            border-color: #2b7be4;
        }
        .banner-sil {
            color: #dc3545;
            border-color: #dc3545;
        }
        .banner-tarih {
            font-size: 13px;                /* biraz küçüldü */
            background-color: white;
            padding: 6px 14px;
            border-radius: 50px;
            border: 2px solid #2b7be4;
            text-align: center;
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            flex-direction: column;          /* alt satıra "Son Güncelleme" yazısı */
            line-height: 1.3;
        }
        .tarih-etiket {
            font-size: 10px;
            color: #2b7be4;
            letter-spacing: 0.5px;
        }
        .tarih-deger {
            font-size: 13px;
        }

        /* ANA SAYFA */
        .ana-icerik {
            padding: 16px;
        }
        .arama-kutusu {
            width: 100%;
            padding: 16px 22px;          /* küçüldü */
            font-size: 18px;              /* 20 → 18 */
            border: 3px solid #ddd;
            border-radius: 50px;
            margin-bottom: 20px;
            background-color: white;
        }
        .baslik-item {
            background-color: white;
            padding: 14px 22px;           /* küçüldü */
            margin-bottom: 10px;
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.03);
            border: 2px solid #eee;
            font-size: 18px;               /* 20 → 18 */
        }
        .baslik-item span {
            cursor: pointer;
            flex: 1;
        }

        /* DETAY SAYFASI */
        .detay-icerik {
            padding: 16px;
            margin-top: 10px;
        }

        /* KARTLAR */
        .detay-kart {
            background-color: white;
            border-radius: 40px;
            padding: 20px;                  /* 24 → 20 */
            margin-bottom: 20px;
            border: 3px solid #e0e0e0;
            box-shadow: 0 6px 12px rgba(0,0,0,0.02);
        }

        /* kart başlıkları (ürün adı, açıklama, resimler) - küçültüldü */
        .kart-baslik {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            font-size: 20px;                /* 26 → 20 */
            color: #2b7be4;
            border-bottom: 2px dashed #2b7be4;
            padding-bottom: 8px;
        }
        .kart-baslik button {
            background: none;
            box-shadow: none;
            padding: 0 !important;
            font-size: 24px !important;      /* 32 → 24 */
            min-width: auto;
            border: none;
            color: #2b7be4;
        }

        .baslik-metin {
            font-size: 28px;                 /* 32 → 28 (hafif küçüldü) */
            font-weight: 800;
            word-break: break-word;
        }

        .baslik-input {
            font-size: 28px;
            padding: 8px 15px;
            border: 3px solid #2b7be4;
            border-radius: 30px;
            width: 100%;
            margin-bottom: 15px;
        }

        /* AÇIKLAMA - iç çizgi kaldırıldı, sadece dış çerçeve */
        .aciklama-kutu {
            background-color: #f5f5f5;
            border: none;                    /* iç çizgi tamamen kalktı */
            border-radius: 40px;
            padding: 24px;
            font-size: 20px;                 /* 22 → 20 */
            min-height: 120px;
            white-space: pre-wrap;
            /* büyük harf dönüşümü yok */
        }

        /* RESİM KARTLARI */
        .resim-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }

        .resim-kart {
            position: relative;
            aspect-ratio: 1 / 1;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid #2b7be4;
            background-color: #f0f0f0;
        }
        .resim-kart img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }
        /* resim üzerindeki sil butonu tamamen kaldırıldı */

        /* GALERİ MODAL (tam ekran) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.98);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 10px;
        }
        .modal.aktif {
            display: flex;
        }

        .galeri-resim-kapsayici {
            width: 100%;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }
        .galeri-resim {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    cursor: zoom-in;
    transition: transform 0.2s;
    /* Android zoom için */
    -webkit-user-select: none;
    user-select: none;
    touch-action: pan-x pan-y pinch-zoom;  /* zoom izni */
}
        .galeri-zoom {
            transform: scale(1.5);
            cursor: zoom-out;
        }

        /* GALERİ ALT SABİT BANNER - yarı saydam, ince, toggle özellikli */
        .galeri-kontrol {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            gap: 12px;
            justify-content: center;
            background-color: rgba(0,0,0,0.6);  /* yarı saydam */
            backdrop-filter: blur(4px);
            padding: 12px 16px;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            z-index: 2100;
            transition: opacity 0.2s;
        }
        .galeri-kontrol button {
            padding: 8px 14px !important;    /* iyice küçüldü */
            font-size: 14px !important;
            min-width: 50px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* ONAY MODALI - butonlar küçültüldü */
        .onay-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            border-radius: 50px;              /* 60 → 50 */
            padding: 24px;                     /* 30 → 24 */
            z-index: 3000;
            border: 4px solid #2b7be4;         /* 5px → 4px */
            max-width: 90%;
            width: 320px;                      /* 350 → 320 */
            text-align: center;
            display: none;
        }
        .onay-modal.aktif {
            display: block;
        }
        .onay-modal h3 {
            font-size: 20px;                   /* 24 → 20 */
            margin-bottom: 20px;                /* 30 → 20 */
        }
        .onay-butonlar {
            display: flex;
            gap: 12px;                          /* 15 → 12 */
            justify-content: center;
        }
        .onay-butonlar button {
            padding: 8px 16px !important;       /* daha küçük */
            font-size: 14px !important;
        }

        .secenek-modal {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background-color: white;
            border-top-left-radius: 40px;
            border-top-right-radius: 40px;
            padding: 24px 16px;                  /* 30 → 24 */
            box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
            z-index: 2000;
            display: none;
            flex-direction: column;
            gap: 12px;                            /* 15 → 12 */
        }
        .secenek-modal.aktif {
            display: flex;
        }

        .sayfa {
            display: none;
        }
        .sayfa.aktif {
            display: block;
        }

        /* butonların genel küçültmesi tamam */
    </style>
</head>
<body>

<!-- ANA SAYFA -->
<div id="anaSayfa" class="sayfa aktif">
    <div class="ana-icerik">
        <input type="text" id="aramaInput" class="arama-kutusu" placeholder="🔍 Parça ara..." autocomplete="off">
        <div style="margin-bottom: 25px;">
            <button class="btn-mavi" id="yeniEkleBtn" style="width: 100%;">➕ YENİ EKLE</button>
        </div>
        <div id="baslikListesi" style="margin-bottom: 100px;"></div>
    </div>
</div>

<!-- DETAY SAYFASI -->
<div id="detaySayfa" class="sayfa">
    <!-- SABİT BANNER -->
    <div class="sabit-banner">
        <button class="banner-geri" id="bannerGeriBtn">⬅️</button>
        <div class="banner-tarih" id="bannerTarih">
            <span class="tarih-etiket">SON GÜNCELLEME</span>
            <span class="tarih-deger">📅 --</span>
        </div>
        <button class="banner-sil" id="bannerSilBtn">🗑️</button>
    </div>

    <div class="detay-icerik">
        <!-- BAŞLIK KARTI -->
        <div class="detay-kart">
            <div class="kart-baslik">
                <span>📌 Parça Adı</span>
                <button id="baslikDuzenleBtn">✏️</button>
            </div>
            <div>
                <span class="baslik-metin" id="baslikGoster">BAŞLIK</span>
                <div id="baslikDuzenlemeAlani" style="display: none;">
                    <input type="text" id="baslikInput" class="baslik-input" placeholder="BAŞLIK GİR">
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <button class="btn-mavi" id="baslikKaydet">✅ KAYDET</button>
                        <button class="btn-kirmizi" id="baslikIptal">❌ İPTAL</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- AÇIKLAMA KARTI -->
        <div class="detay-kart">
            <div class="kart-baslik">
                <span>📝 AÇIKLAMA</span>
                <button id="aciklamaDuzenleBtn">✏️</button>
            </div>
            <div class="aciklama-kutu" id="aciklamaMetin">AÇIKLAMA</div>
        </div>

        <!-- RESİMLER KARTI -->
        <div class="detay-kart">
            <div class="kart-baslik">
                <span>🖼️ RESİMLER</span>
                <button id="resimEkleBtn">📷</button>
            </div>
            <div id="resimListesi" class="resim-grid"></div>
        </div>
    </div>
</div>

<!-- AÇIKLAMA DÜZENLEME SAYFASI -->
<div id="aciklamaDuzenlemeSayfa" class="sayfa">
    <div style="padding: 16px;">
        <div class="detay-kart" style="min-height: 70vh;">
            <h2 style="font-size: 28px; margin-bottom: 20px;">✏️ AÇIKLAMA DÜZENLE</h2>
            <textarea id="aciklamaTextarea" rows="8" style="width: 100%; padding: 20px; font-size: 20px; border-radius: 40px; border: 3px solid #2b7be4; margin-bottom: 20px;"></textarea>
            <div style="display: flex; gap: 12px; justify-content: center;">
                <button class="btn-mavi" id="aciklamaKaydetBtn">✅ KAYDET</button>
                <button class="btn-kirmizi" id="aciklamaIptalBtn">❌ İPTAL</button>
            </div>
        </div>
    </div>
</div>

<!-- TAM EKRAN GALERİ MODAL -->
<div id="galeriModal" class="modal">
    <div class="galeri-resim-kapsayici" id="galeriKapsayici">
        <img id="galeriImg" class="galeri-resim" src="" alt="resim" onclick="toggleGaleriButonlari()">
    </div>
    <div class="galeri-kontrol" id="galeriKontrol">
        <button class="btn-mavi" id="galeriOnce">⬅️</button>
        <button class="btn-mavi" id="galeriSonra">➡️</button>
        <button class="btn-kirmizi" id="galeriSil">🗑️</button>
        <button class="btn-mavi" id="galeriKapat">✖️</button>
    </div>
</div>

<!-- TEMA UYUMLU ONAY MODALI -->
<div id="onayModal" class="onay-modal">
    <h3 id="onayMesaj">🗑️ SİLME ONAYI</h3>
    <div class="onay-butonlar">
        <button class="btn-mavi" id="onayEvet">✅ EVET</button>
        <button class="btn-kirmizi" id="onayHayir">❌ HAYIR</button>
    </div>
</div>

<!-- KAMERA/GALERİ SEÇENEK MODAL -->
<div id="secenekModal" class="secenek-modal">
    <button class="btn-mavi" id="galeriSec">📁 GALERİDEN SEÇ</button>
    <button class="btn-mavi" id="kameraSec">📸 KAMERA İLE ÇEK</button>
    <button class="btn-kirmizi" id="secenekIptal">❌ İPTAL</button>
</div>

<script>
    (function() {
        // ---------- VERİLER ----------
        let kayitlar = [];
        let onayCallback = null;

        function verileriYukle() {
            const stored = localStorage.getItem('resimliNotlar');
            if (stored) {
                try {
                    kayitlar = JSON.parse(stored);
                } catch (e) {
                    kayitlar = [];
                }
            } else {
                kayitlar = [];  // örnek kayıt yok
                verileriKaydet();
            }
        }

        function verileriKaydet() {
            localStorage.setItem('resimliNotlar', JSON.stringify(kayitlar));
        }

        verileriYukle();

        // ---------- STATE ----------
        let aktifKayitId = null;
        let galeriIndex = 0;
        let galeriResimList = [];
        let galeriButonGorunur = true;

        // URL hash
        function hashdenIdAl() {
            const hash = window.location.hash;
            if (hash.startsWith('#detay-')) {
                return Number(hash.replace('#detay-', ''));
            }
            return null;
        }

        function hashGuncelle(id) {
            window.location.hash = id ? `detay-${id}` : '';
        }

        // ---------- ONAY MODALI ----------
        function onayGoster(mesaj, callback) {
            document.getElementById('onayMesaj').innerText = mesaj;
            onayCallback = callback;
            document.getElementById('onayModal').classList.add('aktif');
        }

        document.getElementById('onayEvet').addEventListener('click', () => {
            document.getElementById('onayModal').classList.remove('aktif');
            if (onayCallback) onayCallback(true);
        });
        
        document.getElementById('onayHayir').addEventListener('click', () => {
            document.getElementById('onayModal').classList.remove('aktif');
            if (onayCallback) onayCallback(false);
        });

        // ---------- SAYFA GEÇİŞLERİ ----------
        function sayfaGoster(sayfaId) {
            // Tüm modal ve düzenleme alanlarını kapat
            document.getElementById('secenekModal').classList.remove('aktif');
            document.getElementById('galeriModal').classList.remove('aktif');
            document.getElementById('onayModal').classList.remove('aktif');
            document.getElementById('baslikDuzenlemeAlani').style.display = 'none';
            document.getElementById('baslikGoster').style.display = 'block';
            document.getElementById('baslikDuzenleBtn').style.display = 'inline-flex';
            
            document.querySelectorAll('.sayfa').forEach(s => s.classList.remove('aktif'));
            document.getElementById(sayfaId).classList.add('aktif');
            
            if (sayfaId === 'anaSayfa') {
                hashGuncelle(null);
                anaSayfayiGuncelle();
            }
        }

        function formatTarih(isoString) {
            if (!isoString) return '--';
            const d = new Date(isoString);
            return d.toLocaleDateString('tr-TR') + ' ' + d.toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'});
        }

        function guncellemeTarihiSet(kayit) {
            kayit.guncelleme = new Date().toISOString();
            verileriKaydet();
        }

        // Ana sayfa
        function anaSayfayiGuncelle() {
            const arama = document.getElementById('aramaInput').value.toUpperCase().trim();
            let filtrelenmis = kayitlar.filter(k => k.baslik.toUpperCase().includes(arama));
            filtrelenmis.sort((a, b) => a.baslik.localeCompare(b.baslik, 'tr', { sensitivity: 'base' }));

            const listeDiv = document.getElementById('baslikListesi');
            listeDiv.innerHTML = '';
            filtrelenmis.forEach(k => {
                const item = document.createElement('div');
                item.className = 'baslik-item';
                item.innerHTML = `<span data-id="${k.id}">${k.baslik || 'BAŞLIKSIZ'}</span>`;
                listeDiv.appendChild(item);
            });

            document.querySelectorAll('.baslik-item span').forEach(el => {
                el.addEventListener('click', (e) => {
                    const id = Number(e.target.dataset.id);
                    aktifKayitId = id;
                    detaySayfasiYukle(id);
                    hashGuncelle(id);
                    sayfaGoster('detaySayfa');
                });
            });
        }

        // Detay sayfası
        function detaySayfasiYukle(id) {
            const kayit = kayitlar.find(k => k.id === id);
            if (!kayit) return;

            document.querySelector('#bannerTarih .tarih-deger').innerText = `📅 ${formatTarih(kayit.guncelleme)}`;
            document.getElementById('baslikGoster').innerText = kayit.baslik || 'BAŞLIK';
            document.getElementById('aciklamaMetin').innerText = kayit.aciklama || 'AÇIKLAMA YOK';

            const resimDiv = document.getElementById('resimListesi');
            resimDiv.innerHTML = '';
            
            if (kayit.resimler && kayit.resimler.length > 0) {
                kayit.resimler.forEach((resimUrl, index) => {
                    const kart = document.createElement('div');
                    kart.className = 'resim-kart';
                    kart.innerHTML = `<img src="${resimUrl}" data-index="${index}">`;
                    
                    kart.addEventListener('click', (e) => {
                        if (e.target.tagName === 'IMG') {
                            galeriResimList = kayit.resimler;
                            galeriIndex = index;
                            document.getElementById('galeriImg').src = kayit.resimler[galeriIndex];
                            document.getElementById('galeriModal').classList.add('aktif');
                            galeriButonGorunur = true;
                            document.getElementById('galeriKontrol').style.opacity = '1';
                        }
                    });
                    resimDiv.appendChild(kart);
                });
            } else {
                resimDiv.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:30px;">📭 RESİM YOK</p>';
            }
        }

        // Galeri butonlarını toggle
        window.toggleGaleriButonlari = function() {
            const kontrol = document.getElementById('galeriKontrol');
            galeriButonGorunur = !galeriButonGorunur;
            kontrol.style.opacity = galeriButonGorunur ? '1' : '0';
        };

        // Android zoom için
        let scale = 1;
        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });

        // ---------- OLAY DİNLEYİCİLER ----------
        document.addEventListener('DOMContentLoaded', () => {
            // İlk state
            history.pushState(null, null, location.href);

            // Telefon geri butonu
            window.addEventListener('popstate', (e) => {
                e.preventDefault();
                
                // Önce açık modal varsa kapat
                if (document.getElementById('secenekModal').classList.contains('aktif')) {
                    document.getElementById('secenekModal').classList.remove('aktif');
                    history.pushState(null, null, location.href);
                    return;
                }
                
                if (document.getElementById('galeriModal').classList.contains('aktif')) {
                    document.getElementById('galeriModal').classList.remove('aktif');
                    history.pushState(null, null, location.href);
                    return;
                }
                
                if (document.getElementById('onayModal').classList.contains('aktif')) {
                    document.getElementById('onayModal').classList.remove('aktif');
                    history.pushState(null, null, location.href);
                    return;
                }
                
                // Düzenleme modundaysa iptal et
                if (document.getElementById('baslikDuzenlemeAlani').style.display === 'block') {
                    document.getElementById('baslikIptal').click();
                    history.pushState(null, null, location.href);
                    return;
                }
                
                // Sayfa geçişi
                const aktifSayfa = document.querySelector('.sayfa.aktif')?.id;
                
                if (aktifSayfa === 'detaySayfa') {
                    sayfaGoster('anaSayfa');
                    history.pushState(null, null, location.href);
                } else if (aktifSayfa === 'aciklamaDuzenlemeSayfa') {
                    sayfaGoster('detaySayfa');
                    history.pushState(null, null, location.href);
                } else {
                    // Ana sayfada geri tuşuna basınca uygulamadan çıkabilir
                    // Chrome'da çalışması için
                    history.pushState(null, null, location.href);
                }
            });

            // Hash kontrol
            const id = hashdenIdAl();
            if (id && kayitlar.some(k => k.id === id)) {
                aktifKayitId = id;
                detaySayfasiYukle(id);
                sayfaGoster('detaySayfa');
            } else {
                sayfaGoster('anaSayfa');
                anaSayfayiGuncelle();
            }

            // Arama
            document.getElementById('aramaInput').addEventListener('input', anaSayfayiGuncelle);

            // Yeni ekle
            document.getElementById('yeniEkleBtn').addEventListener('click', () => {
                const yeniId = Date.now();
                kayitlar.push({
                    id: yeniId,
                    baslik: 'YENİ BAŞLIK',
                    aciklama: 'Yeni açıklama...',
                    resimler: [],
                    guncelleme: new Date().toISOString()
                });
                verileriKaydet();
                aktifKayitId = yeniId;
                detaySayfasiYukle(yeniId);
                hashGuncelle(yeniId);
                sayfaGoster('detaySayfa');
            });

            // Banner geri
            document.getElementById('bannerGeriBtn').addEventListener('click', () => {
                sayfaGoster('anaSayfa');
                history.pushState(null, null, location.href);
            });

            // Banner sil
            document.getElementById('bannerSilBtn').addEventListener('click', () => {
                onayGoster('🗑️ KAYDI TAMAMEN SİL?', (onay) => {
                    if (onay) {
                        kayitlar = kayitlar.filter(k => k.id !== aktifKayitId);
                        verileriKaydet();
                        sayfaGoster('anaSayfa');
                    }
                });
            });

            // BAŞLIK DÜZENLE
            document.getElementById('baslikDuzenleBtn').addEventListener('click', () => {
                document.getElementById('baslikGoster').style.display = 'none';
                document.getElementById('baslikDuzenleBtn').style.display = 'none';
                document.getElementById('baslikDuzenlemeAlani').style.display = 'block';
                document.getElementById('baslikInput').value = document.getElementById('baslikGoster').innerText;
                history.pushState(null, null, location.href);
            });

            document.getElementById('baslikKaydet').addEventListener('click', () => {
                const yeniBaslik = document.getElementById('baslikInput').value.trim() || 'BAŞLIK';
                const kayit = kayitlar.find(k => k.id === aktifKayitId);
                if (kayit) {
                    kayit.baslik = yeniBaslik;
                    guncellemeTarihiSet(kayit);
                }
                document.getElementById('baslikGoster').innerText = yeniBaslik;
                document.getElementById('baslikGoster').style.display = 'block';
                document.getElementById('baslikDuzenleBtn').style.display = 'inline-flex';
                document.getElementById('baslikDuzenlemeAlani').style.display = 'none';
                detaySayfasiYukle(aktifKayitId);
            });

            document.getElementById('baslikIptal').addEventListener('click', () => {
                document.getElementById('baslikGoster').style.display = 'block';
                document.getElementById('baslikDuzenleBtn').style.display = 'inline-flex';
                document.getElementById('baslikDuzenlemeAlani').style.display = 'none';
            });

            // AÇIKLAMA DÜZENLE
            document.getElementById('aciklamaDuzenleBtn').addEventListener('click', () => {
                const kayit = kayitlar.find(k => k.id === aktifKayitId);
                if (kayit) {
                    document.getElementById('aciklamaTextarea').value = kayit.aciklama || '';
                }
                sayfaGoster('aciklamaDuzenlemeSayfa');
                history.pushState(null, null, location.href);
            });

            document.getElementById('aciklamaKaydetBtn').addEventListener('click', () => {
                const yeniAciklama = document.getElementById('aciklamaTextarea').value.trim() || 'Açıklama yok';
                const kayit = kayitlar.find(k => k.id === aktifKayitId);
                if (kayit) {
                    kayit.aciklama = yeniAciklama;
                    guncellemeTarihiSet(kayit);
                }
                document.getElementById('aciklamaMetin').innerText = yeniAciklama;
                sayfaGoster('detaySayfa');
                detaySayfasiYukle(aktifKayitId);
            });

            document.getElementById('aciklamaIptalBtn').addEventListener('click', () => {
                sayfaGoster('detaySayfa');
            });

            // RESİM EKLE
            document.getElementById('resimEkleBtn').addEventListener('click', () => {
                document.getElementById('secenekModal').classList.add('aktif');
                history.pushState(null, null, location.href);
            });

            document.getElementById('galeriSec').addEventListener('click', () => {
                document.getElementById('secenekModal').classList.remove('aktif');
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            const kayit = kayitlar.find(k => k.id === aktifKayitId);
                            if (kayit) {
                                if (!kayit.resimler) kayit.resimler = [];
                                kayit.resimler.push(event.target.result);
                                guncellemeTarihiSet(kayit);
                                detaySayfasiYukle(aktifKayitId);
                            }
                        };
                        reader.readAsDataURL(file);
                    }
                };
                input.click();
            });

document.getElementById('kameraSec').addEventListener('click', () => {
    document.getElementById('secenekModal').classList.remove('aktif');
    
    // Android için basit çözüm
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    
    input.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            
            reader.onload = (event) => {
                const kayit = kayitlar.find(k => k.id === aktifKayitId);
                if (kayit) {
                    if (!kayit.resimler) kayit.resimler = [];
                    kayit.resimler.push(event.target.result);
                    guncellemeTarihiSet(kayit);
                    
                    // RESİM LİSTESİNİ YENİDEN YÜKLE (en garanti yöntem)
                    detaySayfasiYukle(aktifKayitId);
                    
                    // Başarılı mesajı
                    setTimeout(() => {
                        alert('📸 Fotoğraf eklendi!');
                    }, 100);
                }
            };
            
            reader.onerror = () => {
                alert('Fotoğraf yüklenirken hata oluştu.');
            };
            
            reader.readAsDataURL(file);
        }
    };
    
    input.onerror = () => {
        alert('Kamera açılamadı.');
    };
    
    input.click();
});

            document.getElementById('secenekIptal').addEventListener('click', () => {
                document.getElementById('secenekModal').classList.remove('aktif');
            });

            // GALERİ
            document.getElementById('galeriKapat').addEventListener('click', () => {
                document.getElementById('galeriModal').classList.remove('aktif');
            });

            document.getElementById('galeriOnce').addEventListener('click', (e) => {
                e.stopPropagation();
                if (galeriResimList.length > 0) {
                    galeriIndex = (galeriIndex - 1 + galeriResimList.length) % galeriResimList.length;
                    document.getElementById('galeriImg').src = galeriResimList[galeriIndex];
                }
            });

            document.getElementById('galeriSonra').addEventListener('click', (e) => {
                e.stopPropagation();
                if (galeriResimList.length > 0) {
                    galeriIndex = (galeriIndex + 1) % galeriResimList.length;
                    document.getElementById('galeriImg').src = galeriResimList[galeriIndex];
                }
            });

            document.getElementById('galeriSil').addEventListener('click', (e) => {
                e.stopPropagation();
                if (galeriResimList.length > 0) {
                    onayGoster('🗑️ BU RESMİ SİL?', (onay) => {
                        if (onay) {
                            const kayit = kayitlar.find(k => k.id === aktifKayitId);
                            if (kayit && kayit.resimler && kayit.resimler.length > galeriIndex) {
                                kayit.resimler.splice(galeriIndex, 1);
                                guncellemeTarihiSet(kayit);
                                if (kayit.resimler.length === 0) {
                                    document.getElementById('galeriModal').classList.remove('aktif');
                                } else {
                                    galeriResimList = kayit.resimler;
                                    galeriIndex = Math.min(galeriIndex, kayit.resimler.length - 1);
                                    document.getElementById('galeriImg').src = kayit.resimler[galeriIndex];
                                }
                                detaySayfasiYukle(aktifKayitId);
                            }
                        }
                    });
                }
            });

            // Galeri dışına tıklama kapatma
            document.getElementById('galeriModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('galeriModal')) {
                    document.getElementById('galeriModal').classList.remove('aktif');
                }
            });

            // Android zoom için
            const galeriImg = document.getElementById('galeriImg');
            let initialDistance = 0;
            
            galeriImg.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    e.preventDefault();
                    const dx = e.touches[0].pageX - e.touches[1].pageX;
                    const dy = e.touches[0].pageY - e.touches[1].pageY;
                    initialDistance = Math.sqrt(dx * dx + dy * dy);
                }
            });

            galeriImg.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2) {
                    e.preventDefault();
                    const dx = e.touches[0].pageX - e.touches[1].pageX;
                    const dy = e.touches[0].pageY - e.touches[1].pageY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (initialDistance > 0) {
                        if (distance > initialDistance) {
                            scale = Math.min(scale + 0.01, 3);
                        } else {
                            scale = Math.max(scale - 0.01, 1);
                        }
                        galeriImg.style.transform = `scale(${scale})`;
                    }
                }
            });

            galeriImg.addEventListener('touchend', (e) => {
                initialDistance = 0;
            });

            // Çift tıklama ile sıfırla
            galeriImg.addEventListener('dblclick', () => {
                scale = 1;
                galeriImg.style.transform = `scale(${scale})`;
            });
        });
    })();
</script>
