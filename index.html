<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KHOJ PROJECT</title>
    <style>
        :root {
            --bg-color: #F5F5F5; /* SÜT BEYAZI */
            --main-blue: #007BFF; /* MAVİ */
            --action-red: #DC3545; /* KIRMIZI */
            --text-dark: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-dark);
        }

        /* BAŞLIKLAR KALIN VE BÜYÜK HARF */
        h1, h2, h3, button, label {
            font-weight: bold;
            text-transform: uppercase;
        }

        .container { max-width: 600px; margin: auto; }

        /* ARAMA VE YENİ EKLE */
        .search-section { margin-bottom: 20px; }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--main-blue);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-red { background-color: var(--action-red); }
        .btn-blue { background-color: var(--main-blue); }

        /* LİSTE EKRANI */
        #list-screen { display: block; }
        .list-item {
            background: white;
            padding: 20px;
            margin-bottom: 10px;
            border: 1px solid var(--main-blue);
            border-radius: 10px;
            font-size: 20px;
            color: var(--main-blue);
        }

        /* DETAY EKRANI */
        #detail-screen { display: none; }
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .box {
            border: 1px solid var(--main-blue);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            min-height: 50px;
        }

        .image-box {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: #eee;
        }

        .img-preview {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 5px;
        }

        .back-btn { margin-bottom: 15px; width: auto; padding: 10px 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="list-screen">
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="ARAMA YAP... 🔍" oninput="filterResults()">
            <button class="btn btn-red" onclick="openNewRecord()">YENİ EKLE ➕</button>
        </div>
        <div id="resultsList">
            </div>
    </div>

    <div id="detail-screen">
        <button class="btn btn-blue back-btn" onclick="goBack()">⬅️ GERİ</button>
        
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 id="detailTitle">PARÇA ADI 🛠️</h2>
                <button class="btn btn-red" style="width: auto; padding: 5px 10px;" onclick="deleteRecord()">🗑️</button>
            </div>

            <label>AÇIKLAMA 📝</label>
            <div class="box" id="detailDesc" contenteditable="false">Açıklama burada görünecek...</div>
            <button class="btn btn-red" onclick="saveDesc()">KAYDET 💾</button>

            <label style="display: block; margin-top: 20px;">RESİMLER 📸</label>
            <div class="box image-box" id="detailImages" onclick="openGallery()">
                </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-red" onclick="selectImageSource('add')">EKLE ➕</button>
                <button class="btn btn-red" onclick="selectImageSource('change')">DEĞİŞTİR 🔄</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ÖRNEK VERİ YAPISI
    let data = [
        { id: 1, title: "MOTOR PARÇASI", desc: "V8 Motor bloğu detayları...", images: [] },
        { id: 2, title: "ŞANZIMAN", desc: "6 ileri manuel şanzıman...", images: [] }
    ];

    let currentId = null;

    function filterResults() {
        const query = document.getElementById('searchInput').value.toUpperCase();
        const list = document.getElementById('resultsList');
        list.innerHTML = "";

        data.filter(item => item.title.includes(query)).forEach(item => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerText = item.title;
            div.onclick = () => openDetail(item.id);
            list.appendChild(div);
        });
    }

    function openDetail(id) {
        currentId = id;
        const item = data.find(i => i.id === id);
        document.getElementById('detailTitle').innerText = item.title;
        document.getElementById('detailDesc').innerText = item.desc;
        document.getElementById('list-screen').style.display = 'none';
        document.getElementById('detail-screen').style.display = 'block';
        
        // Telefon geri tuşu için history push
        history.pushState({screen: 'detail'}, "");
    }

    function goBack() {
        document.getElementById('list-screen').style.display = 'block';
        document.getElementById('detail-screen').style.display = 'none';
    }

    // Telefonun geri tuşunu yakalama
    window.onpopstate = function(event) {
        goBack();
    };

    function openNewRecord() {
        const newId = Date.now();
        data.push({ id: newId, title: "YENİ KAYIT 🆕", desc: "", images: [] });
        openDetail(newId);
    }

    function saveDesc() {
        const descText = document.getElementById('detailDesc').innerText;
        const item = data.find(i => i.id === currentId);
        item.desc = descText;
        alert("AÇIKLAMA KAYDEDİLDİ 💾");
    }

    function deleteRecord() {
        if(confirm("BU KAYDI SİLMEK İSTEDİĞİNİZE EMİN MİSİNİZ? 🗑️")) {
            data = data.filter(i => i.id !== currentId);
            goBack();
            filterResults();
        }
    }

    // İlk yükleme
    filterResults();
</script>

</body>
</html>
