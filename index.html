<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>📱 RESİMLİ NOTLAR</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
body { background-color: #faf9f6; min-height: 100vh; padding-bottom: 20px; font-size: 13px; }
h1, h2, h3, p, span, button, input, textarea { font-weight: 700 !important; letter-spacing: 0.3px; }
button {
    border: none; border-radius: 30px; padding: 8px 10px; font-size: 10px; font-weight: 700;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;
    box-shadow: 0 4px 8px rgba(0,0,0,0.05); transition: all 0.1s ease; border: 2px solid transparent;
}
button:active { transform: scale(0.97); }
.btn-mavi { background-color: #2b7be4; color: white; }
.btn-kirmizi { background-color: #dc3545; color: white; }

.sabit-banner {
    position: sticky; top: 0; left: 0; width: 100%; background-color: #faf9f6;
    padding: 2px 5px 3px 10px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 3px solid #2b7be4; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}
.banner-geri, .banner-sil {
    background: none; box-shadow: none; padding: 2px 6px !important; font-size: 18px !important;
    border: 1px solid; background-color: white;
}
.banner-geri { color: #2b7be4; border-color: #2b7be4; }
.banner-sil { color: #dc3545; border-color: #dc3545; }
.banner-tarih {
    font-size: 8px; background-color: white; padding: 1px 14px; border-radius: 50px;
    border: 1px solid #2b7be4; text-align: center; max-width: 200px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; display: flex; flex-direction: column; line-height: 1.3;
}
.tarih-etiket { font-size: 8px; color: #2b7be4; letter-spacing: 0.5px; }
.tarih-deger { font-size: 10px; }

.ana-icerik { padding: 12px; }
.arama-kutusu {
    width: 100%; padding: 6px 18px; font-size: 13px; border: 3px solid #ddd;
    border-radius: 50px; margin-bottom: 20px; background-color: white;
}
.baslik-item {
    background-color: white; padding: 14px 22px; margin-bottom: 10px; border-radius: 40px;
    display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 4px 8px rgba(0,0,0,0.03); border: 2px solid #eee; font-size: 12px;
}
.baslik-item span { cursor: pointer; flex: 1; }

.detay-icerik { padding: 16px; margin-top: 10px; }
.detay-kart {
    background-color: white; border-radius: 40px; padding: 20px; margin-bottom: 20px;
    border: 3px solid #e0e0e0; box-shadow: 0 6px 12px rgba(0,0,0,0.02);
}
.kart-baslik {
    display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 14px;
    color: #2b7be4; border-bottom: 2px dashed #2b7be4; padding-bottom: 8px;
}
.kart-baslik button {
    background: none; box-shadow: none; padding: 0 !important; font-size: 16px !important;
    min-width: auto; border: none; color: #2b7be4;
}
.baslik-metin { font-size: 13px; font-weight: 700; word-break: break-word; }
.baslik-input {
    font-size: 12px; padding: 8px 15px; border: 3px solid #2b7be4;
    border-radius: 30px; width: 100%; margin-bottom: 15px;
}
.aciklama-kutu {
    background-color: #f5f5f5; border: none; border-radius: 40px; padding: 24px;
    font-size: 17px; min-height: 120px; white-space: pre-wrap;
}
.resim-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 12px; margin-top: 10px;
}
.resim-kart {
    position: relative; aspect-ratio: 1 / 1; border-radius: 20px; overflow: hidden;
    border: 3px solid #2b7be4; background-color: #f0f0f0;
}
.resim-kart img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

.modal {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.98); z-index: 2000; justify-content: center;
    align-items: center; flex-direction: column; padding: 10px;
}
.modal.aktif { display: flex; }
.galeri-resim-kapsayici {
    width: 100%; height: 80vh; display: flex; justify-content: center;
    align-items: center; overflow: auto; -webkit-overflow-scrolling: touch;
}
.galeri-resim {
    max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain;
    cursor: zoom-in; -webkit-user-select: none; user-select: none;
    touch-action: pan-x pan-y pinch-zoom; will-change: transform;
}
.galeri-kontrol {
    position: fixed; bottom: 0; left: 0; width: 100%; display: flex; gap: 12px;
    justify-content: center; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    padding: 12px 16px; border-top-left-radius: 30px; border-top-right-radius: 30px;
    z-index: 2100; transition: opacity 0.2s;
}
.galeri-kontrol button {
    padding: 5px 8px !important; font-size: 10px !important; min-width: 50px;
    border: 1px solid rgba(255,255,255,0.3);
}
.onay-modal {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background-color: white; border-radius: 40px; padding: 20px; z-index: 3000;
    border: 4px solid #2b7be4; max-width: 90%; width: 320px; text-align: center; display: none;
}
.onay-modal.aktif { display: block; }
.onay-modal h3 { font-size: 16px; margin-bottom: 20px; }
.onay-butonlar { display: flex; gap: 10px; justify-content: center; }
.onay-butonlar button { padding: 6px 14px !important; font-size: 14px !important; }

.secenek-modal {
    position: fixed; bottom: 0; left: 0; width: 100%; background-color: white;
    border-top-left-radius: 40px; border-top-right-radius: 40px; padding: 18px 10px;
    box-shadow: 0 -10px 30px rgba(0,0,0,0.2); z-index: 2000;
    display: none; flex-direction: column; gap: 10px;
}
.secenek-modal.aktif { display: flex; }
.sayfa { display: none; }
.sayfa.aktif { display: block; }

@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* Açıklama düzenleme alanı normal yazı stili */
#aciklamaInput {
    font-weight: normal !important;
}

</style>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Resimli Notlar">
<meta name="theme-color" content="#2b7be4">
</head>
<body>

<!-- ANA SAYFA -->
<div id="anaSayfa" class="sayfa aktif">
    <div class="ana-icerik">
        <input type="text" id="aramaInput" class="arama-kutusu" placeholder="🔍 Parça adı..." autocomplete="off">
        <div style="margin-bottom: 25px;">
            <button class="btn-mavi" id="yeniEkleBtn" style="width: 100%;">➕ Yeni Parça Ekle</button>
        </div>
        <div id="baslikListesi" style="margin-bottom: 100px;"></div>
    </div>
</div>

<!-- DETAY SAYFASI -->
<div id="detaySayfa" class="sayfa">
    <div class="sabit-banner">
        <button class="banner-geri" id="bannerGeriBtn">⬅️</button>
        <div class="banner-tarih" id="bannerTarih">
            <span class="tarih-etiket">SON GÜNCELLEME</span>
            <span class="tarih-deger">📅 --</span>
        </div>
        <button class="banner-sil" id="bannerSilBtn">🗑️</button>
    </div>
    <div class="detay-icerik">
        <!-- BAŞLIK KARTI -->
        <div class="detay-kart">
            <div class="kart-baslik"><span>📌 Parça Adı</span><button id="baslikDuzenleBtn">✏️</button></div>
            <div>
                <span class="baslik-metin" id="baslikGoster">BAŞLIK</span>
                <div id="baslikDuzenlemeAlani" style="display: none;">
                    <input type="text" id="baslikInput" class="baslik-input" placeholder="BAŞLIK GİR">
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <button class="btn-mavi" id="baslikKaydet">✅ KAYDET</button>
                        <button class="btn-kirmizi" id="baslikIptal">❌ İPTAL</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- AÇIKLAMA KARTI -->
        <div class="detay-kart">
            <div class="kart-baslik"><span>📝 AÇIKLAMA</span><button id="aciklamaDuzenleBtn">✏️</button></div>
            <div>
                <div class="aciklama-kutu" id="aciklamaMetin">AÇIKLAMA</div>
                <div id="aciklamaDuzenlemeAlani" style="display: none;">
                    <textarea id="aciklamaInput" rows="4" class="baslik-input" placeholder="AÇIKLAMA GİR" style="min-height: 100px; font-weight: normal;"></textarea>
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <button class="btn-mavi" id="aciklamaKaydet">✅ KAYDET</button>
                        <button class="btn-kirmizi" id="aciklamaIptal">❌ İPTAL</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- RESİMLER KARTI -->
        <div class="detay-kart">
            <div class="kart-baslik"><span>🖼️ RESİMLER</span><button id="resimEkleBtn">📷</button></div>
            <div id="resimListesi" class="resim-grid"></div>
            
            <div id="yuklemeKarti" style="display: none; margin-top: 10px;">
                <div style="background: #f0f0f0; border-radius: 20px; padding: 20px; text-align: center; border: 3px dashed #2b7be4;">
                    <div style="font-size: 32px; animation: spin 1s linear infinite;">◎</div>
                    <div style="font-size: 14px; margin-top: 10px;">Fotoğraf yükleniyor...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODALLAR -->
<div id="galeriModal" class="modal">
    <div class="galeri-resim-kapsayici" id="galeriKapsayici">
        <img id="galeriImg" class="galeri-resim" src="" alt="resim" onclick="toggleGaleriButonlari()">
    </div>
    <div class="galeri-kontrol" id="galeriKontrol">
        <button class="btn-mavi" id="galeriOnce">⬅️</button>
        <button class="btn-mavi" id="galeriSonra">➡️</button>
        <button class="btn-kirmizi" id="galeriSil">🗑️</button>
        <button class="btn-mavi" id="galeriKapat">✖️</button>
    </div>
</div>

<div id="onayModal" class="onay-modal">
    <h3 id="onayMesaj">🗑️ SİLME ONAYI</h3>
    <div class="onay-butonlar">
        <button class="btn-mavi" id="onayEvet">✅ EVET</button>
        <button class="btn-kirmizi" id="onayHayir">❌ HAYIR</button>
    </div>
</div>

<div id="secenekModal" class="secenek-modal">
    <button class="btn-mavi" id="galeriSec">📁 GALERİDEN SEÇ</button>
    <button class="btn-mavi" id="kameraSec">📸 KAMERA İLE ÇEK</button>
    <button class="btn-kirmizi" id="secenekIptal">❌ İPTAL</button>
</div>

<script type="module">
// Firebase Importları
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyClpsUxz81-qXr_ytRO1kiDz2BEoZJFwVE",
    authDomain: "edel-2c027.firebaseapp.com",
    projectId: "edel-2c027",
    storageBucket: "edel-2c027.firebasestorage.app",
    messagingSenderId: "1059038629442",
    appId: "1:1059038629442:web:e5ee6b76f892ccd1eee7db"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// State
let kayitlar = [];
let aktifKayitId = null;
let galeriIndex = 0;
let galeriResimList = [];
let galeriButonGorunur = true;
let onayCallback = null;

// ImgBB'ye resim yükle
async function resmiImgbbYukle(base64Data) {
    const formData = new FormData();
    formData.append('key', '176f42d16abd94bd651530d5e098e656');
    formData.append('image', base64Data.split(',')[1]);
    
    try {
        const response = await fetch('https://api.imgbb.com/1/upload', {
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        if (data.success) {
            return data.data.url;
        } else {
            console.error('ImgBB hatası:', data);
            return null;
        }
    } catch (e) {
        console.error('ImgBB bağlantı hatası:', e);
        return null;
    }
}

// ImgBB'den resim sil
async function resmiImgbbSil(resimUrl) {
    try {
        // ImgBB'nin silme API'si
        const deleteResponse = await fetch(`https://api.imgbb.com/1/delete?key=176f42d16abd94bd651530d5e098e656`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ url: resimUrl })
        });
        
        const data = await deleteResponse.json();
        return data.success;
    } catch (e) {
        console.error('ImgBB silme hatası:', e);
        return false;
    }
}

// Firebase'den verileri yükle
async function verileriYukle() {
    try {
        const querySnapshot = await getDocs(collection(db, "notlar"));
        kayitlar = [];
        querySnapshot.forEach((doc) => {
            kayitlar.push({ id: Number(doc.id), ...doc.data() });
        });
        anaSayfayiGuncelle();
    } catch (e) {
        console.error("Veri yükleme hatası:", e);
        kayitlar = [];
        anaSayfayiGuncelle();
    }
}

async function kaydiGuncelle(kayit) {
    try {
        await setDoc(doc(db, "notlar", String(kayit.id)), kayit);
    } catch (e) {
        console.error("Kayıt hatası:", e);
    }
}

async function kaydiSil(id) {
    try {
        await deleteDoc(doc(db, "notlar", String(id)));
    } catch (e) {
        console.error("Silme hatası:", e);
    }
}

// Yardımcı fonksiyonlar
function hashdenIdAl() {
    const hash = window.location.hash;
    if (hash.startsWith('#detay-')) return Number(hash.replace('#detay-', ''));
    return null;
}

function hashGuncelle(id) { window.location.hash = id ? `detay-${id}` : ''; }

function onayGoster(mesaj, callback) {
    document.getElementById('onayMesaj').innerText = mesaj;
    onayCallback = callback;
    document.getElementById('onayModal').classList.add('aktif');
}

document.getElementById('onayEvet').addEventListener('click', () => {
    document.getElementById('onayModal').classList.remove('aktif');
    if (onayCallback) onayCallback(true);
});

document.getElementById('onayHayir').addEventListener('click', () => {
    document.getElementById('onayModal').classList.remove('aktif');
    if (onayCallback) onayCallback(false);
});

function sayfaGoster(sayfaId) {
    document.getElementById('secenekModal').classList.remove('aktif');
    document.getElementById('galeriModal').classList.remove('aktif');
    document.getElementById('onayModal').classList.remove('aktif');
    document.getElementById('baslikDuzenlemeAlani').style.display = 'none';
    document.getElementById('aciklamaDuzenlemeAlani').style.display = 'none';
    document.getElementById('baslikGoster').style.display = 'block';
    document.getElementById('aciklamaMetin').style.display = 'block';
    document.getElementById('baslikDuzenleBtn').style.display = 'inline-flex';
    document.getElementById('aciklamaDuzenleBtn').style.display = 'inline-flex';
    
    document.querySelectorAll('.sayfa').forEach(s => s.classList.remove('aktif'));
    document.getElementById(sayfaId).classList.add('aktif');
    if (sayfaId === 'anaSayfa') { hashGuncelle(null); anaSayfayiGuncelle(); }
}

function formatTarih(isoString) {
    if (!isoString) return '--';
    const d = new Date(isoString);
    return d.toLocaleDateString('tr-TR') + ' ' + d.toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'});
}

function guncellemeTarihiSet(kayit) {
    kayit.guncelleme = new Date().toISOString();
    kaydiGuncelle(kayit);
}

function anaSayfayiGuncelle() {
    const arama = document.getElementById('aramaInput').value.toUpperCase().trim();
    let filtrelenmis = kayitlar.filter(k => k.baslik && k.baslik.toUpperCase().includes(arama));
    filtrelenmis.sort((a, b) => (a.baslik || '').localeCompare(b.baslik || '', 'tr', { sensitivity: 'base' }));
    
    const listeDiv = document.getElementById('baslikListesi');
    listeDiv.innerHTML = '';
    filtrelenmis.forEach(k => {
        const item = document.createElement('div');
        item.className = 'baslik-item';
        item.innerHTML = `<span data-id="${k.id}">${k.baslik || 'BAŞLIKSIZ'}</span>`;
        listeDiv.appendChild(item);
    });
    
    document.querySelectorAll('.baslik-item span').forEach(el => {
        el.addEventListener('click', (e) => {
            const id = Number(e.target.dataset.id);
            aktifKayitId = id;
            detaySayfasiYukle(id);
            hashGuncelle(id);
            sayfaGoster('detaySayfa');
        });
    });
}

function detaySayfasiYukle(id) {
    const kayit = kayitlar.find(k => k.id === id);
    if (!kayit) return;
    
    document.querySelector('#bannerTarih .tarih-deger').innerText = `📅 ${formatTarih(kayit.guncelleme)}`;
    document.getElementById('baslikGoster').innerText = kayit.baslik || 'Parça adı';
    document.getElementById('aciklamaMetin').innerText = kayit.aciklama || 'AÇIKLAMA YOK';
    
    const resimDiv = document.getElementById('resimListesi');
    resimDiv.innerHTML = '';
    
    if (kayit.resimler && kayit.resimler.length > 0) {
        kayit.resimler.forEach((resimUrl, index) => {
            const kart = document.createElement('div');
            kart.className = 'resim-kart';
            kart.innerHTML = `<img src="${resimUrl}" data-index="${index}">`;
            kart.addEventListener('click', (e) => {
                if (e.target.tagName === 'IMG') {
                    galeriResimList = kayit.resimler;
                    galeriIndex = index;
                    document.getElementById('galeriImg').src = kayit.resimler[galeriIndex];
                    document.getElementById('galeriModal').classList.add('aktif');
                    galeriButonGorunur = true;
                    document.getElementById('galeriKontrol').style.opacity = '1';
                }
            });
            resimDiv.appendChild(kart);
        });
    } else {
        resimDiv.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:30px;">📭 RESİM YOK</p>';
    }
}

window.toggleGaleriButonlari = function() {
    const kontrol = document.getElementById('galeriKontrol');
    galeriButonGorunur = !galeriButonGorunur;
    kontrol.style.opacity = galeriButonGorunur ? '1' : '0';
};

// Boş kart silme fonksiyonu
async function bosKartSil(id) {
    const kayit = kayitlar.find(k => k.id === id);
    if (kayit) {
        const bosKart = (
            (kayit.baslik === '' || kayit.baslik === 'YENİ PARÇA') && 
            kayit.aciklama === ' ' && 
            (!kayit.resimler || kayit.resimler.length === 0)
        );
        
        if (bosKart) {
            await kaydiSil(id);
            kayitlar = kayitlar.filter(k => k.id !== id);
            console.log('Boş kart silindi');
            return true;
        }
    }
    return false;
}

// Başlatma
document.addEventListener('DOMContentLoaded', async () => {
    await verileriYukle();
    history.pushState(null, null, location.href);
    
    window.addEventListener('popstate', async (e) => {
        e.preventDefault();
        
        // Modal kontrolleri
        if (document.getElementById('secenekModal').classList.contains('aktif')) {
            document.getElementById('secenekModal').classList.remove('aktif');
            history.pushState(null, null, location.href); return;
        }
        if (document.getElementById('galeriModal').classList.contains('aktif')) {
            document.getElementById('galeriModal').classList.remove('aktif');
            history.pushState(null, null, location.href); return;
        }
        if (document.getElementById('onayModal').classList.contains('aktif')) {
            document.getElementById('onayModal').classList.remove('aktif');
            history.pushState(null, null, location.href); return;
        }
        if (document.getElementById('baslikDuzenlemeAlani').style.display === 'block') {
            document.getElementById('baslikIptal').click();
            history.pushState(null, null, location.href); return;
        }
        if (document.getElementById('aciklamaDuzenlemeAlani').style.display === 'block') {
            document.getElementById('aciklamaIptal').click();
            history.pushState(null, null, location.href); return;
        }
        
        // Sayfa geçişi ve boş kart kontrolü
        const aktifSayfa = document.querySelector('.sayfa.aktif')?.id;
        if (aktifSayfa === 'detaySayfa') { 
            // Detay sayfasından çıkarken boş kartı sil
            await bosKartSil(aktifKayitId);
            sayfaGoster('anaSayfa'); 
            history.pushState(null, null, location.href); 
        } else { 
            history.pushState(null, null, location.href); 
        }
    });

    const id = hashdenIdAl();
    if (id && kayitlar.some(k => k.id === id)) {
        aktifKayitId = id;
        detaySayfasiYukle(id);
        sayfaGoster('detaySayfa');
    } else {
        sayfaGoster('anaSayfa');
    }

    // Arama
    document.getElementById('aramaInput').addEventListener('input', anaSayfayiGuncelle);

    // Yeni ekle (BOŞ KART ENGELLEMELİ - BEKLEMESİZ)
    document.getElementById('yeniEkleBtn').addEventListener('click', async () => {
        const yeniId = Date.now();
        const yeniKayit = { 
            id: yeniId, 
            baslik: '', 
            aciklama: ' ', 
            resimler: [], 
            guncelleme: new Date().toISOString() 
        };
        
        kayitlar.push(yeniKayit);
        await kaydiGuncelle(yeniKayit);
        
        aktifKayitId = yeniId;
        detaySayfasiYukle(yeniId);
        hashGuncelle(yeniId);
        sayfaGoster('detaySayfa');
        
        // setTimeout YOK - anında kontrol geri butonunda yapılacak
    });

    // Banner geri (DÜZELTİLDİ - boş kart kontrolü eklendi)
    document.getElementById('bannerGeriBtn').addEventListener('click', async () => { 
        await bosKartSil(aktifKayitId);
        sayfaGoster('anaSayfa'); 
        history.pushState(null, null, location.href); 
    });

    // Banner sil
    document.getElementById('bannerSilBtn').addEventListener('click', () => {
        onayGoster('🗑️ KAYDI TAMAMEN SİL?', async (onay) => {
            if (onay) {
                await kaydiSil(aktifKayitId);
                kayitlar = kayitlar.filter(k => k.id !== aktifKayitId);
                sayfaGoster('anaSayfa');
            }
        });
    });

    // BAŞLIK DÜZENLE (input boş gelir)
    document.getElementById('baslikDuzenleBtn').addEventListener('click', () => {
        document.getElementById('baslikGoster').style.display = 'none';
        document.getElementById('baslikDuzenleBtn').style.display = 'none';
        document.getElementById('baslikDuzenlemeAlani').style.display = 'block';
        
        // BOŞ GELİR
        document.getElementById('baslikInput').value = '';
        document.getElementById('baslikInput').focus();
        
        history.pushState(null, null, location.href);
    });

    document.getElementById('baslikKaydet').addEventListener('click', async () => {
        const yeniBaslik = document.getElementById('baslikInput').value.trim();
        if (yeniBaslik === '') {
            alert('Lütfen bir başlık girin');
            return;
        }
        
        const kayit = kayitlar.find(k => k.id === aktifKayitId);
        if (kayit) {
            kayit.baslik = yeniBaslik;
            guncellemeTarihiSet(kayit);
        }
        document.getElementById('baslikGoster').innerText = yeniBaslik;
        document.getElementById('baslikGoster').style.display = 'block';
        document.getElementById('baslikDuzenleBtn').style.display = 'inline-flex';
        document.getElementById('baslikDuzenlemeAlani').style.display = 'none';
        detaySayfasiYukle(aktifKayitId);
    });

    document.getElementById('baslikIptal').addEventListener('click', () => {
        document.getElementById('baslikGoster').style.display = 'block';
        document.getElementById('baslikDuzenleBtn').style.display = 'inline-flex';
        document.getElementById('baslikDuzenlemeAlani').style.display = 'none';
    });

    // AÇIKLAMA DÜZENLE
    document.getElementById('aciklamaDuzenleBtn').addEventListener('click', () => {
        document.getElementById('aciklamaMetin').style.display = 'none';
        document.getElementById('aciklamaDuzenleBtn').style.display = 'none';
        document.getElementById('aciklamaDuzenlemeAlani').style.display = 'block';
        
        const kayit = kayitlar.find(k => k.id === aktifKayitId);
        document.getElementById('aciklamaInput').value = kayit?.aciklama || '';
        
        history.pushState(null, null, location.href);
    });

    document.getElementById('aciklamaKaydet').addEventListener('click', async () => {
        const yeniAciklama = document.getElementById('aciklamaInput').value.trim() || 'Açıklama yok';
        const kayit = kayitlar.find(k => k.id === aktifKayitId);
        
        if (kayit) {
            kayit.aciklama = yeniAciklama;
            guncellemeTarihiSet(kayit);
        }
        
        document.getElementById('aciklamaMetin').innerText = yeniAciklama;
        document.getElementById('aciklamaMetin').style.display = 'block';
        document.getElementById('aciklamaDuzenleBtn').style.display = 'inline-flex';
        document.getElementById('aciklamaDuzenlemeAlani').style.display = 'none';
        detaySayfasiYukle(aktifKayitId);
    });

    document.getElementById('aciklamaIptal').addEventListener('click', () => {
        document.getElementById('aciklamaMetin').style.display = 'block';
        document.getElementById('aciklamaDuzenleBtn').style.display = 'inline-flex';
        document.getElementById('aciklamaDuzenlemeAlani').style.display = 'none';
    });

    // RESİM EKLE
    document.getElementById('resimEkleBtn').addEventListener('click', () => {
        document.getElementById('secenekModal').classList.add('aktif');
        history.pushState(null, null, location.href);
    });

    // Galeriden Seç
    document.getElementById('galeriSec').addEventListener('click', () => {
        document.getElementById('secenekModal').classList.remove('aktif');
        
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const imgUrl = await resmiImgbbYukle(event.target.result);
                    
                    if (imgUrl) {
                        const kayit = kayitlar.find(k => k.id === aktifKayitId);
                        if (kayit) {
                            if (!kayit.resimler) kayit.resimler = [];
                            kayit.resimler.push(imgUrl);
                            guncellemeTarihiSet(kayit);
                            detaySayfasiYukle(aktifKayitId);
                        }
                    } else {
                        alert('Resim yüklenemedi!');
                    }
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    });

    // Kamera ile Çek
    document.getElementById('kameraSec').addEventListener('click', () => {
        document.getElementById('secenekModal').classList.remove('aktif');
        
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.setAttribute('capture', 'environment');
        
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 10 * 1024 * 1024) {
                    alert('Dosya çok büyük! Lütfen 10MB altında bir fotoğraf seçin.');
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const imgUrl = await resmiImgbbYukle(event.target.result);
                    
                    if (imgUrl) {
                        const kayit = kayitlar.find(k => k.id === aktifKayitId);
                        if (kayit) {
                            if (!kayit.resimler) kayit.resimler = [];
                            kayit.resimler.push(imgUrl);
                            guncellemeTarihiSet(kayit);
                            detaySayfasiYukle(aktifKayitId);
                            setTimeout(() => { alert('📸 Fotoğraf eklendi!'); }, 100);
                        }
                    } else {
                        alert('Fotoğraf yüklenemedi!');
                    }
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    });

    document.getElementById('secenekIptal').addEventListener('click', () => { 
        document.getElementById('secenekModal').classList.remove('aktif'); 
    });

    // GALERİ İŞLEMLERİ
    document.getElementById('galeriKapat').addEventListener('click', () => { 
        document.getElementById('galeriModal').classList.remove('aktif'); 
    });
    
    document.getElementById('galeriOnce').addEventListener('click', (e) => {
        e.stopPropagation();
        if (galeriResimList.length > 0) {
            galeriIndex = (galeriIndex - 1 + galeriResimList.length) % galeriResimList.length;
            document.getElementById('galeriImg').src = galeriResimList[galeriIndex];
        }
    });
    
    document.getElementById('galeriSonra').addEventListener('click', (e) => {
        e.stopPropagation();
        if (galeriResimList.length > 0) {
            galeriIndex = (galeriIndex + 1) % galeriResimList.length;
            document.getElementById('galeriImg').src = galeriResimList[galeriIndex];
        }
    });

document.getElementById('galeriSil').addEventListener('click', (e) => {
    e.stopPropagation();
    if (galeriResimList.length > 0) {
        onayGoster('🗑️ BU RESMİ SİL?', async (onay) => {
            if (onay) {
                const kayit = kayitlar.find(k => k.id === aktifKayitId);
                if (kayit && kayit.resimler && kayit.resimler.length > galeriIndex) {
                    
                    // ÖNCE ImgBB'den sil
                    await resmiImgbbSil(kayit.resimler[galeriIndex]);
                    
                    // SONRA uygulamadan ve Firebase'den sil
                    kayit.resimler.splice(galeriIndex, 1);
                    guncellemeTarihiSet(kayit);
                    
                    if (kayit.resimler.length === 0) {
                        document.getElementById('galeriModal').classList.remove('aktif');
                    } else {
                        galeriResimList = kayit.resimler;
                        galeriIndex = Math.min(galeriIndex, kayit.resimler.length - 1);
                        document.getElementById('galeriImg').src = kayit.resimler[galeriIndex];
                    }
                    detaySayfasiYukle(aktifKayitId);
                }
            }
        });
    }
});

    document.getElementById('galeriModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('galeriModal')) {
            document.getElementById('galeriModal').classList.remove('aktif');
        }
    });

    // ZOOM
    const galeriImg = document.getElementById('galeriImg');
    const galeriKapsayici = document.getElementById('galeriKapsayici');
    let zoomScale = 1; 
    let lastDistance = 0;
    let isPanning = false;
    let startX = 0, startY = 0, translateX = 0, translateY = 0;

    function sifirlaZoom() {
        zoomScale = 1; translateX = 0; translateY = 0;
        galeriImg.style.transform = `translate(0px, 0px) scale(1)`;
        galeriImg.style.transition = 'transform 0.2s';
    }

    const galeriModal = document.getElementById('galeriModal');
    const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
            if (mutation.target.classList.contains('aktif')) sifirlaZoom();
        });
    });
    observer.observe(galeriModal, { attributes: true, attributeFilter: ['class'] });

    document.getElementById('galeriOnce').addEventListener('click', () => { setTimeout(sifirlaZoom, 50); });
    document.getElementById('galeriSonra').addEventListener('click', () => { setTimeout(sifirlaZoom, 50); });

    galeriImg.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            e.preventDefault();
            const dx = e.touches[0].pageX - e.touches[1].pageX;
            const dy = e.touches[0].pageY - e.touches[1].pageY;
            lastDistance = Math.sqrt(dx * dx + dy * dy);
            galeriImg.style.transition = 'none';
        } else if (e.touches.length === 1 && zoomScale > 1) {
            isPanning = true;
            startX = e.touches[0].pageX - translateX;
            startY = e.touches[0].pageY - translateY;
            galeriImg.style.transition = 'none';
            e.preventDefault();
        }
    }, { passive: false });

    galeriImg.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2) {
            e.preventDefault();
            const dx = e.touches[0].pageX - e.touches[1].pageX;
            const dy = e.touches[0].pageY - e.touches[1].pageY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            if (lastDistance > 0) {
                const delta = (distance - lastDistance) * 0.01;
                const newScale = Math.min(Math.max(zoomScale + delta, 1), 4);
                zoomScale = newScale;
                galeriImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${zoomScale})`;
                lastDistance = distance;
            }
        } else if (e.touches.length === 1 && isPanning) {
            e.preventDefault();
            translateX = e.touches[0].pageX - startX;
            translateY = e.touches[0].pageY - startY;
            const imgWidth = galeriImg.offsetWidth * zoomScale;
            const imgHeight = galeriImg.offsetHeight * zoomScale;
            const containerWidth = galeriKapsayici.offsetWidth;
            const containerHeight = galeriKapsayici.offsetHeight;
            const maxX = Math.max(0, (imgWidth - containerWidth) / 2);
            translateX = Math.min(maxX, Math.max(-maxX, translateX));
            const maxY = Math.max(0, (imgHeight - containerHeight) / 2);
            translateY = Math.min(maxY, Math.max(-maxY, translateY));
            galeriImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${zoomScale})`;
        }
    }, { passive: false });

    galeriImg.addEventListener('touchend', (e) => {
        if (e.touches.length < 2) lastDistance = 0;
        if (e.touches.length === 0) isPanning = false;
    });

    galeriImg.addEventListener('dblclick', (e) => {
        e.preventDefault();
        if (zoomScale > 1.1) {
            zoomScale = 1; translateX = 0; translateY = 0;
        } else {
            zoomScale = 2.5;
            const rect = galeriImg.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            translateX = (galeriKapsayici.offsetWidth / 2) - (clickX * zoomScale);
            translateY = (galeriKapsayici.offsetHeight / 2) - (clickY * zoomScale);
        }
        galeriImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${zoomScale})`;
        galeriImg.style.transition = 'transform 0.2s';
    });
    
    galeriKapsayici.addEventListener('touchstart', (e) => {
        if (zoomScale > 1) e.preventDefault();
    }, { passive: false });
});
</script>

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
        .then(registration => { console.log('SW kaydedildi:', registration.scope); })
        .catch(err => { console.log('SW hatası:', err); });
    });
}
</script>
